<form
  (ngSubmit)="submit()"
  class="max-w-sm mx-auto pt-28"
>
  <div class="mb-5">
    <label for="email" class="block mb-2 text-sm font-medium text-gray-900"
      >Email
    </label>
    <input
      type="email"
      [(ngModel)]="email"
      name="email"
      required
      class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5"
    />
  </div>
  <div class="flex justify-end pr-4 pt-4">
    <button
      type="submit"
      class="bg-blue-500 hover:bg-blue-700 disabled:bg-gray-800 cursor-pointer text-white font-bold py-2 px-4 rounded"
    >
      Envoyer
    </button>
  </div>
</form>

<p>{{message}}</p>
